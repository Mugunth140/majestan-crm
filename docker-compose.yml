services:
  crm-frontend:
    image: ghcr.io/mugunth140/crm-frontend:latest
    build:
      context: ./crm-frontend
      target: builder
    command: ["bun", "run", "dev"]
    ports:
      - "4000:4000"
    env_file: ../.env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - NEXT_PUBLIC_API_URL=${CRM_NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      - PORT=4000
    networks:
      - majestan_network
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./crm-frontend
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: ./crm-frontend/package.json

  crm-backend:
    image: ghcr.io/mugunth140/crm-backend:latest
    build:
      context: ./crm-backend
      target: builder
    command: ["bun", "run", "start:dev"]
    ports:
      - "8000:8000"
    env_file: ../.env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=8000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - DB_NAME=${CRM_DB_NAME:-majestan_crm}
      - CRM_DB_NAME=${CRM_DB_NAME:-majestan_crm}
      - SITE_DB_NAME=${SITE_DB_NAME:-majestan}
      - JWT_SECRET=${CRM_JWT_SECRET}
      - FRONTEND_URL=${CRM_FRONTEND_URL:-http://localhost:4000}
    networks:
      - majestan_network
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./crm-backend
          target: /app
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: ./crm-backend/package.json

networks:
  majestan_network:
    external: true
