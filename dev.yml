services:
  crm-frontend:
    build:
      context: ./crm-frontend
      target: builder
    command: bun run dev
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      - PORT=4000
    networks:
      - majestan_network
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./crm-frontend/src
          target: /app/src
        - action: sync
          path: ./crm-frontend/public
          target: /app/public
        - action: rebuild
          path: ./crm-frontend/package.json
        - action: rebuild
          path: ./crm-frontend/next.config.ts

  crm-backend:
    build:
      context: ./crm-backend
      target: builder
    command: bun run start:dev
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PORT=8000
    networks:
      - majestan_network
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./crm-backend/src
          target: /app/src
        - action: rebuild
          path: ./crm-backend/package.json

networks:
  majestan_network:
    external: true
